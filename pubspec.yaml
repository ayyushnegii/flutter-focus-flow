name: flutter_focus_flow
description: A polished Pomodoro + task manager app with dark neon UX
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_hooks: ^0.20.0
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.7
  audioplayers: ^5.0.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_native_splash: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/neon_logo.svg